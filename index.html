<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Corazón I love you – elegante</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .heart-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .border-text {
            position: absolute;
            font-family: 'Great Vibes', cursive, serif;
            font-size: clamp(14px, 2.5vw, 22px);
            color: #ff99cc;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            pointer-events: none;
            will-change: opacity, text-shadow;
            opacity: 0.06;
            text-shadow: 0 0 6px rgba(255,153,204,0.15);
        }
    </style>
</head>
<body>
    <div class="heart-container" id="heartContainer"></div>

    <script>
        (function() {
            const container = document.getElementById('heartContainer');
            let centerX = window.innerWidth / 2;
            let centerY = window.innerHeight / 2;

            function heartX(t) {
                return 16 * Math.pow(Math.sin(t), 3);
            }
            function heartY(t) {
                return 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            }

            // Escala que ajusta el corazón al 80% de la dimensión más restrictiva (ancho o alto)
            function getScale() {
                const heartWidth = 32;   // rango de heartX: -16 a 16
                const heartHeight = 42;  // rango de heartY: aprox -21 a 21
                const maxWidth = window.innerWidth * 0.8;
                const maxHeight = window.innerHeight * 0.8;
                const scaleX = maxWidth / heartWidth;
                const scaleY = maxHeight / heartHeight;
                return Math.min(scaleX, scaleY);
            }

            let scale = getScale();
            const totalPoints = 100;   // bordes limpios y buen rendimiento
            const elements = [];

            function createTexts() {
                container.innerHTML = '';
                elements.length = 0;
                scale = getScale();
                centerX = window.innerWidth / 2;
                centerY = window.innerHeight / 2;

                for (let i = 0; i < totalPoints; i++) {
                    const t = (i / totalPoints) * Math.PI * 2;
                    const x = heartX(t) * scale;
                    const y = heartY(t) * scale;

                    const span = document.createElement('span');
                    span.className = 'border-text';
                    span.textContent = 'I love you';
                    span.style.left = (centerX + x) + 'px';
                    span.style.top = (centerY - y) + 'px';
                    span.dataset.progress = i / totalPoints;
                    container.appendChild(span);
                    elements.push(span);
                }
            }

            createTexts();

            let wavePos = 0;
            const waveWidth = 0.25;
            const speed = 0.008;       // fluidez ajustada para móviles recientes

            function animate() {
                wavePos = (wavePos + speed) % 1;

                for (let el of elements) {
                    const pos = parseFloat(el.dataset.progress);
                    let dist = Math.abs(pos - wavePos);
                    if (dist > 0.5) dist = 1 - dist;

                    let intensity = 0;
                    if (dist < waveWidth / 2) {
                        intensity = Math.cos((dist / (waveWidth / 2)) * Math.PI / 2);
                    }

                    const opacity = 0.06 + intensity * (1 - 0.06);
                    el.style.opacity = opacity;
                    el.style.textShadow = 
                        `0 0 ${6 + intensity * 20}px rgba(255,153,204, ${0.15 + intensity * 0.7})`;
                }
                requestAnimationFrame(animate);
            }
            animate();

            window.addEventListener('resize', () => {
                centerX = window.innerWidth / 2;
                centerY = window.innerHeight / 2;
                scale = getScale();
                elements.forEach(el => {
                    const t = parseFloat(el.dataset.progress) * Math.PI * 2;
                    const x = heartX(t) * scale;
                    const y = heartY(t) * scale;
                    el.style.left = (centerX + x) + 'px';
                    el.style.top = (centerY - y) + 'px';
                });
            });
        })();
    </script>
</body>
</html>
